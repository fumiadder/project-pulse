name: Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Prepare deploy package
        run: |
          mkdir -p deploy-package
          cp -r dist deploy-package/
          cp -r deploy/api deploy-package/
          cp deploy/docker-compose.yml deploy-package/
          cp deploy/nginx.conf deploy-package/
          mkdir -p deploy-package/data

      - name: Deploy to server via rsync
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avz --delete --exclude='data/*.db' --exclude='data/*.db-wal' --exclude='data/*.db-shm'
          path: deploy-package/
          remote_path: /opt/project-pulse/
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Restart Docker containers
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/project-pulse
            docker-compose down
            docker-compose up -d --build

      - name: Health check
        run: |
          sleep 10
          curl -f http://${{ secrets.SERVER_HOST }}/api/health || exit 1
